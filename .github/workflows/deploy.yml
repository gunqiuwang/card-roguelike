name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
      - 'feat/v0.1-visual-skeleton'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # 注意：不启用 cache: npm。本项目暂不提交 package-lock.json
          # （避免旧毛坯依赖残留冲突）。待 v0.2 稳定后再生成并提交 lock。

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build (with Pages base path)
        env:
          VITE_BASE: /card-roguelike/
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
